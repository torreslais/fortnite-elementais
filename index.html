<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <title>Fortnite Sprites Locker</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-apple.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sprites Locker" />
</head>
<body>
  <div class="install-toast" id="install-box" hidden>
    <div class="install-toast-text">
      <strong id="install-title"></strong>
      <span id="install-text"></span>
      <span class="install-offline" id="install-offline"></span>
    </div>
    <button class="install-btn" id="install-btn" type="button" hidden></button>
    <button class="install-close" id="install-close" type="button" aria-label="×">×</button>
  </div>

  <div class="app-header">
    <!-- O rótulo já vem preenchido para não depender do JavaScript. -->
    <button class="refresh-btn" id="refresh-btn" type="button" title="Atualizar">
      <span aria-hidden="true">⟳</span><span id="refresh-label">Atualizar</span>
    </button>
    <img class="header-icon" src="icon-192.png" alt="Fortnite Sprites Locker"
         width="32" height="32" />
    <div class="lang-switch" id="lang-switch">
      <button class="lang-btn" data-lang="pt">PT</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </div>

  <header class="topbar">
    <h1 id="app-title"></h1>
    <p class="subtitle" id="app-subtitle"></p>
  </header>

  <main class="container">
    <!-- Menu de navegação rápida: um ícone por Elemental; clicar rola até o
         card. Fica grudado abaixo do cabeçalho enquanto a página rola.
         Recolhido é uma linha rolável; o botão expande em várias linhas. -->
    <nav class="sprite-nav" id="sprite-nav">
      <div class="sprite-nav-icons" id="sprite-nav-icons"></div>
      <button class="sprite-nav-toggle" id="sprite-nav-toggle" type="button">▾</button>
    </nav>

    <section class="controls">
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-rarity="all"></button>
        <button class="filter-tab" data-rarity="Rare"></button>
        <button class="filter-tab" data-rarity="Epic"></button>
        <button class="filter-tab" data-rarity="Legendary"></button>
        <button class="filter-tab" data-rarity="Mythic"></button>
        <button class="filter-tab" data-rarity="owned"></button>
        <button class="filter-tab" data-rarity="not-owned"></button>
        <button class="filter-tab" data-rarity="mastered"></button>
        <button class="filter-tab" data-rarity="not-mastered"></button>
        <button class="filter-tab" data-rarity="favorites"></button>
      </div>

      <div class="sort-row">
        <label class="sort-label" id="sort-label" for="sort-select"></label>
        <select class="sort-select" id="sort-select">
          <option value="default"></option>
          <option value="rarity"></option>
          <option value="alpha"></option>
        </select>
      </div>
    </section>

    <section class="progress">
      <div class="progress-row">
        <div class="progress-bar" id="progress-bar-owned"></div>
        <span class="progress-label" id="progress-label-owned"></span>
      </div>
      <div class="progress-row">
        <div class="progress-bar" id="progress-bar-mastered"></div>
        <span class="progress-label" id="progress-label-mastered"></span>
      </div>
      <!-- Baixa um PNG com o resumo da coleção (tenho/dominado). -->
      <button class="export-btn" id="export-btn" type="button">
        <span aria-hidden="true">📸</span><span id="export-label"></span>
      </button>
      <!-- Gera um link para comparar a coleção com a de um amigo (sem backend). -->
      <button class="export-btn" id="share-btn" type="button">
        <span aria-hidden="true">🔗</span><span id="share-label"></span>
      </button>
    </section>

    <section id="elemental-grid" class="elemental-grid"></section>

    <p id="empty-state" class="empty-state" hidden></p>
  </main>

  <footer class="footer">
    <p id="app-footer"></p>
  </footer>

  <button class="back-to-top" id="back-to-top" type="button" hidden>
    <span aria-hidden="true">↑</span>
  </button>

  <!-- Visualizador do resumo exportado: mostra a imagem gerada com opção
       de baixar, em vez de disparar o download direto. -->
  <div class="export-overlay" id="export-overlay" hidden>
    <div class="export-box">
      <img id="export-img" alt="" />
      <div class="export-actions">
        <button class="export-copy" id="export-copy" type="button"></button>
        <a class="export-download" id="export-download"></a>
        <button class="export-close" id="export-close" type="button"></button>
      </div>
    </div>
  </div>

  <!-- Gera/copia um link de comparação, ou aceita colar o de um amigo. -->
  <div class="export-overlay" id="share-overlay" hidden>
    <div class="export-box share-box">
      <div class="share-section">
        <label class="share-field-label" id="share-link-label" for="share-link-input"></label>
        <div class="share-field-row">
          <input class="share-input" id="share-link-input" type="text" readonly />
          <button class="export-copy" id="share-copy-btn" type="button"></button>
        </div>
      </div>
      <div class="share-section">
        <label class="share-field-label" id="share-paste-label" for="share-paste-input"></label>
        <div class="share-field-row">
          <input class="share-input" id="share-paste-input" type="text" />
          <button class="export-copy" id="share-paste-btn" type="button"></button>
        </div>
        <p class="share-error" id="share-paste-error" hidden></p>
      </div>
      <div class="export-actions">
        <button class="export-close" id="share-close" type="button"></button>
      </div>
    </div>
  </div>

  <!-- Comparação somente-leitura contra a coleção decodificada de um link. -->
  <div class="export-overlay" id="compare-overlay" hidden>
    <div class="export-box compare-box">
      <div class="compare-header">
        <h2 id="compare-title"></h2>
        <button class="export-close" id="compare-close" type="button"></button>
      </div>
      <div class="compare-stats" id="compare-stats"></div>
      <!-- Amigo-exclusivo primeiro, o seu-exclusivo abaixo (nessa ordem). -->
      <div class="compare-lists">
        <div class="compare-list-col" id="compare-only-them"></div>
        <div class="compare-list-col" id="compare-only-you"></div>
      </div>
    </div>
  </div>

  <script src="data/elementals.js"></script>
  <script src="data/elementals-auto.js"></script>
  <script src="icons.js"></script>
  <script src="app.js"></script>
</body>
</html>
