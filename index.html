<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1115" />
  <title>Fortnite — Painel de Elementais</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Elementais" />
</head>
<body>
  <header class="topbar">
    <div class="lang-switch" id="lang-switch">
      <button class="lang-btn" data-lang="pt">PT</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <h1 id="app-title"></h1>
    <p class="subtitle" id="app-subtitle"></p>
  </header>

  <main class="container">
    <section class="controls">
      <input
        type="search"
        id="search-input"
        class="search-input"
        autocomplete="off"
      />

      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-rarity="all"></button>
        <button class="filter-tab" data-rarity="Rare"></button>
        <button class="filter-tab" data-rarity="Epic"></button>
        <button class="filter-tab" data-rarity="Legendary"></button>
        <button class="filter-tab" data-rarity="Mythic"></button>
        <button class="filter-tab" data-rarity="owned"></button>
      </div>
    </section>

    <section class="progress">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span id="progress-label"></span>
    </section>

    <section id="elemental-grid" class="elemental-grid"></section>

    <p id="empty-state" class="empty-state" hidden></p>

    <section class="install-box" id="install-box" hidden>
      <h2 id="install-title"></h2>
      <p id="install-text"></p>
      <button class="install-btn" id="install-btn" hidden></button>
      <p class="install-offline" id="install-offline"></p>
    </section>
  </main>

  <footer class="footer">
    <p id="app-footer"></p>
  </footer>

  <script src="data/elementals.js"></script>
  <script src="icons.js"></script>
  <script src="app.js"></script>
</body>
</html>
