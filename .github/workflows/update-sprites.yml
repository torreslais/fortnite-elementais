name: Update Sprites from the wiki

on:
  schedule:
    # Diariamente às 06:17 UTC (horário "quebrado" evita os picos do Actions).
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-sprites
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Detect new sprites on the wiki
        run: node scripts/update-sprites.mjs

      # A main é protegida (mudanças só via pull request), então o robô
      # publica numa branch auxiliar e abre/atualiza um PR. O merge do PR
      # dispara o deploy do Pages normalmente.
      - name: Commit to the auto branch and open/update a PR
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- data/elementals-auto.js; then
            echo "Nenhuma mudança para publicar."
            exit 0
          fi
          NEW=$(git diff -- data/elementals-auto.js \
            | sed -n 's/^+.*"wikiName": "\(.*\)".*/\1/p' | paste -sd ', ' -)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/elementals-auto.js
          git commit -m "Add new Sprites from the wiki: $NEW"
          git push --force origin HEAD:auto/update-sprites
          if [ -z "$(gh pr list --head auto/update-sprites --state open --json number --jq '.[].number')" ]; then
            gh pr create --base main --head auto/update-sprites \
              --title "Novos Sprites da wiki: $NEW" \
              --body "$(cat <<'EOF'
          O robô de atualização encontrou Sprites novos na [Fortnite Wiki](https://fortnite.fandom.com/wiki/Sprites). Eles entram no app com nome em inglês e habilidade "ainda não revelada" até serem curados.

          Ao fazer o merge, o deploy do GitHub Pages roda sozinho e o app atualiza.

          Para curar depois, mova as entradas de `data/elementals-auto.js` para `data/elementals.js` preenchendo: nome em português, texto da habilidade (PT e EN) e exceções de variantes (ex.: sem Metalizado, variantes exclusivas como Cubo/Quack).
          EOF
          )"
          else
            echo "PR já aberto — a branch foi atualizada."
          fi
